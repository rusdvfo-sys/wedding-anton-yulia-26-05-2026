<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Антон и Юлия</title>
  <style>
    :root {
      --paper: rgba(255, 252, 247, 0.9);
      --paper-strong: rgba(255, 254, 251, 0.96);
      --line: rgba(185, 173, 147, 0.62);
      --shadow: 0 20px 48px rgba(126, 116, 96, 0.12);
      --text: #564f46;
      --muted: #81776a;
      --accent: #6f7f78;
      --accent-soft: #dfe5df;
      --gold: #b3a27d;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      padding: 18px;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(196, 206, 198, 0.36), transparent 30%),
        radial-gradient(circle at bottom left, rgba(214, 204, 184, 0.36), transparent 28%),
        linear-gradient(180deg, #faf7f1 0%, #f4efe6 100%);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      display: grid;
      place-items: center;
    }

    .card {
      width: min(760px, 100%);
      padding: 28px 18px 20px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(7px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 14px;
      border: 1.2px solid rgba(179, 162, 125, 0.88);
      border-radius: 22px;
      pointer-events: none;
    }

    .card > * {
      position: relative;
      z-index: 1;
    }

    .hero {
      text-align: center;
      padding: 12px 8px 8px;
    }

    h1,
    h2 {
      font-family: "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-weight: 400;
    }

    h1 {
      font-size: clamp(34px, 7vw, 54px);
      line-height: 1.02;
      color: #62706a;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .hero-subtitle {
      font-family: "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: clamp(21px, 4.5vw, 30px);
      line-height: 1.15;
      color: #7a7064;
    }

    .section {
      margin-top: 16px;
      padding: 18px;
      border-radius: 22px;
      background: var(--paper-strong);
      border: 1px solid rgba(192, 181, 156, 0.46);
    }

    .section h2 {
      text-align: center;
      font-size: clamp(26px, 5vw, 36px);
      color: #66736d;
      margin-bottom: 14px;
      letter-spacing: 0.03em;
    }

    .social-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .profile-card {
      padding: 18px 16px;
      border-radius: 18px;
      border: 1px solid rgba(186, 176, 149, 0.52);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(247, 243, 235, 0.92));
      text-align: center;
    }

    .profile-role {
      margin-bottom: 6px;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .social-link,
    .button,
    .contact-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 46px;
      padding: 11px 18px;
      border-radius: 999px;
      text-decoration: none;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .social-link {
      width: 100%;
      border: 1px solid rgba(178, 163, 131, 0.52);
      background: linear-gradient(135deg, rgba(255, 250, 245, 0.98), rgba(238, 243, 239, 0.98));
      color: #5a534a;
      font-size: 15px;
      box-shadow: 0 10px 22px rgba(121, 110, 88, 0.08);
    }

    .social-link:hover,
    .button:hover,
    .contact-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(111, 127, 120, 0.14);
    }

    .icon-wrap {
      width: 28px;
      height: 28px;
      flex: 0 0 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: linear-gradient(135deg, #d4c7a5, #91a49c);
      color: #fffdf9;
    }

    .icon-wrap svg {
      width: 15px;
      height: 15px;
      fill: currentColor;
    }

    .host-note {
      max-width: 560px;
      margin: 4px auto 10px;
      text-align: center;
      font-size: clamp(12px, 2.7vw, 14px);
      line-height: 1.5;
      color: #8a8072;
    }

    .contact-list {
      display: grid;
      gap: 10px;
    }

    .contact-link {
      width: 100%;
      border: 1px solid rgba(176, 163, 136, 0.52);
      background: rgba(255, 253, 250, 0.95);
      color: #5a534a;
      font-size: 15px;
      box-shadow: 0 10px 22px rgba(121, 110, 88, 0.08);
    }

    .actions {
      margin-top: 18px;
      display: flex;
      justify-content: center;
    }

    .button {
      border: 1px solid rgba(166, 153, 125, 0.5);
      color: #fffdf9;
      background: linear-gradient(135deg, #8d856d, #68716d);
      box-shadow: 0 12px 24px rgba(104, 113, 109, 0.2);
      font-size: 16px;
    }

    @media (max-width: 640px) {
      body {
        padding: 10px;
      }

      .card {
        padding: 20px 12px 16px;
        border-radius: 22px;
      }

      .card::before {
        inset: 10px;
        border-radius: 18px;
      }

      .section {
        padding: 14px 12px;
        margin-top: 12px;
      }

      .social-grid {
        grid-template-columns: 1fr;
      }

      .profile-card {
        padding: 16px 12px;
      }

      .social-link,
      .contact-link,
      .button {
        font-size: 14px;
        min-height: 44px;
        padding: 10px 14px;
      }
    }
  </style>
</head>
